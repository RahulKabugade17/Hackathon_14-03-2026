name: Regression Android Tests

on:
  # Manual trigger
  workflow_dispatch:

  # Scheduled runs - every day at 7:30 AM UTC
#  schedule:
#    - cron: '30 4 * * *'

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'  # You can adjust this version if needed

      - name: Install Dependencies
        run: npm install

      - name: Run Android Tests
        run: npm run android

      - name: Generate Allure Report
        run: npm run allure:generate

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report